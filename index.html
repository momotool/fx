<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MomoTool（モモツール）｜momotool.net</title>
  <meta name="description" content="momotool.net — FX入門からツール紹介まで、わかりやすいガイドを届けます。">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="./" class="logo">MomoTool<span class="logo-dot">.</span>net</a>
      <nav class="nav">
        <a href="fx/">FX入門</a>
      </nav>
      <button class="menu-btn" id="menuBtn" aria-label="メニューを開く">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-inner">
        <p class="hero-label">momotool.net</p>
        <h1 class="hero-title">
          わかりやすいガイドで、<br>
          一歩ずつ。
        </h1>
        <p class="hero-sub">
          FX入門・ツール紹介など、これから増えていくコンテンツの入口です。
        </p>
        <a href="fx/" class="btn btn-primary">FX入門を読む</a>
      </div>
      <div class="hero-accent"></div>
    </section>

    <section class="section section-alt">
      <div class="container">
        <h2 class="section-title">コンテンツ</h2>
        <div class="card-grid">
          <a href="fx/" class="card" style="text-decoration: none; color: inherit;">
            <span class="card-icon">📈</span>
            <h3>FX入門</h3>
            <p>超初心者のためのFX環境構築ナビ。「上か下か」の世界を正しく歩く手順書。デモ取引の始め方まで。</p>
          </a>
          <div class="card" style="opacity: 0.85;">
            <span class="card-icon">🔧</span>
            <h3>ツール紹介（準備中）</h3>
            <p>今後、便利なツールやサービスの紹介を追加予定です。</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p class="footer-logo">MomoTool<span class="logo-dot">.</span>net</p>
      <p class="footer-disclaimer">各コンテンツは情報提供を目的としており、投資・購入の勧誘ではありません。ご利用はご自身の責任でお願いします。</p>
      <p class="footer-copy">&copy; MomoTool.net</p>
    </div>
  </footer>

  <script>
    (function() {
      var btn = document.getElementById('menuBtn');
      var header = document.querySelector('.header');
      if (btn && header) {
        btn.addEventListener('click', function() {
          header.classList.toggle('is-open');
          btn.setAttribute('aria-label', header.classList.contains('is-open') ? 'メニューを閉じる' : 'メニューを開く');
        });
        document.querySelectorAll('.nav a').forEach(function(a) {
          a.addEventListener('click', function() {
            header.classList.remove('is-open');
          });
        });
      }
    })();
  </script>
</body>
</html>
